server:
  port: 8080

spring:
  application:
    name: jewelry-custom
  datasource:
    url: jdbc:mysql://localhost:3306/jewelry_custom?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.jewelry.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: ${JWT_SECRET:jewelry_custom_secret_key_2026}
  expiration: 86400000  # 24 小时

# 微信小程序配置
wechat:
  miniprogram:
    appid: ${WECHAT_APPID:}
    secret: ${WECHAT_SECRET:}
  pay:
    appid: ${WECHAT_PAY_APPID:}
    mchid: ${WECHAT_MCHID:}
    privateKeyPath: ${WECHAT_PRIVATE_KEY_PATH:}
    certificatePath: ${WECHAT_CERT_PATH:}

# 阿里云 OSS
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    accessKeyId: ${OSS_ACCESS_KEY_ID:}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET:}
    bucketName: ${OSS_BUCKET_NAME:jewelry-custom}

# 日志
logging:
  level:
    com.jewelry: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
